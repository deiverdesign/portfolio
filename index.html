<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Meu Portfólio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header id="cabecalho"></header>

    <main id="lista-projetos">
      <!-- os projetos vão aparecer aqui, gerados pelo JavaScript -->
    </main>

    <script>
      const projetos = [
  {
    titulo: "CURE Intelligence / SCRIOO",
    descricao: "Plataforma de inteligência de riscos em supply chain com IA."
  },
  {
    titulo: "HP Subscription Onboarding",
    descricao: "Configuração guiada para um modelo de assinatura com impressora incluída."
  },
  {
    titulo: "Theodoor",
    descricao: "App acessível para automação de portas inteligentes."
  },
  {
    titulo: "Intuit for Education",
    descricao: "Experiência de educação financeira para estudantes."
  }
];
      const perfil = { nome: "Deiver Brito", cargo: "Senior Product Designer · Florianópolis · Brazil" };

      function criarCabecalhoHTML(perfil) {
        return `
        <h1>${perfil.nome}</h1>
        <p>${perfil.cargo}</p>
      `;
}
      function criarProjetoHTML(projeto) {
        return `
          <section>
            <h2>${projeto.titulo}</h2>
            <p>${projeto.descricao}</p>
          </section>
        `;
      }

      const container = document.getElementById("lista-projetos");
        projetos.forEach(projeto => {
          container.innerHTML += criarProjetoHTML(projeto);
      });
      document.getElementById("cabecalho").innerHTML = criarCabecalhoHTML(perfil);
    </script>
  </body>
</html>
