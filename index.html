<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Meu Portfólio</title>
  </head>
  <body>
    <header>
      <h1>Deiver Brito</h1>
      <p>Designer de Produto</p>
    </header>

    <main id="lista-projetos">
      <!-- os projetos vão aparecer aqui, gerados pelo JavaScript -->
    </main>

    <script>
      const projetos = [
        { titulo: "Projeto A", descricao: "Descrição breve do projeto A." },
        { titulo: "Projeto B", descricao: "Descrição breve do projeto B." },
        { titulo: "Projeto C", descricao: "Descrição breve do projeto C." },
        { titulo: "Projeto D", descricao: "Descrição breve do projeto D." }
      ];

      function criarProjetoHTML(projeto) {
        return `
          <section>
            <h2>${projeto.titulo}</h2>
            <p>${projeto.descricao}</p>
          </section>
        `;
      }

      const container = document.getElementById("lista-projetos");
      projetos.forEach(projeto => {
        container.innerHTML += criarProjetoHTML(projeto);
      });
    </script>
  </body>
</html>
